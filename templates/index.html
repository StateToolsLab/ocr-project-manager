<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Project Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap');

  :root {
    --bg: #0f0f0f;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --border: #2a2a2a;
    --border2: #333;
    --text: #f0ebe4;
    --text2: #b8a898;
    --text3: #7a6e64;
    --accent: #c8a96e;
    --accent2: #8b6f47;
    --warn: #d4826a;
    --ok: #6a9d6e;
    --blue: #6a8db0;
    --font-serif: 'Noto Serif JP', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  [data-theme="light"] {
    --bg: #eef4f9;
    --bg2: #ffffff;
    --bg3: #dce8f2;
    --border: #bdd0e0;
    --border2: #96b4ca;
    --text: #0a1929;
    --text2: #1e4060;
    --text3: #5a7e98;
    --accent: #1565a8;
    --accent2: #0d4d8a;
    --warn: #c0392b;
    --ok: #1a7a3c;
    --blue: #1565a8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-serif);
    font-size: 14px;
    font-weight: 400;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--accent);
    font-weight: 300;
    text-transform: uppercase;
  }
  .logo span { color: var(--text3); }
  .header-path {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
  }
  .header-path .sep { color: var(--border2); margin: 0 4px; }
  .header-path .active { color: var(--text2); }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
  }
  .btn-icon {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    cursor: pointer;
    width: 22px; height: 22px;
    border-radius: 4px;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

  .project-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .project-item {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .project-item:hover { background: var(--bg3); }
  .project-item.active {
    border-left-color: var(--accent);
    background: var(--bg3);
  }
  .project-name {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 3px;
  }
  .project-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
  }
  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Welcome Screen ── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text3);
  }
  .welcome-icon { font-size: 48px; opacity: 0.3; }
  .welcome-text { font-size: 14px; }

  /* ── Project View ── */
  .project-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .project-toolbar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: var(--bg2);
  }
  .project-toolbar-title {
    font-size: 14px;
    color: var(--text);
    margin-right: auto;
  }

  .btn {
    padding: 5px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font-serif);
    transition: all 0.15s;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
  }
  .btn:hover { border-color: var(--accent2); color: var(--text); }
  .btn-primary {
    background: var(--accent2);
    border-color: var(--accent);
    color: var(--text);
  }
  .btn-primary:hover { background: var(--accent); }
  .btn-danger { border-color: var(--warn); color: var(--warn); }
  .btn-danger:hover { background: var(--warn); color: #fff; }

  /* ── Content area with page list + editor ── */
  .content-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Page List Panel ── */
  .page-panel {
    width: 200px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .page-panel-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .page-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .page-item {
    padding: 8px 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .page-item:hover { background: var(--bg3); }
  .page-item.active {
    background: var(--bg3);
    border-left-color: var(--blue);
  }
  .page-item-name {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }
  .page-item-status {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text3);
  }
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .dot-done { background: var(--ok); }
  .dot-pending { background: var(--accent2); }
  .dot-none { background: var(--border2); }

  /* drag handle */
  .drag-handle {
    cursor: grab;
    color: var(--text3);
    margin-right: 6px;
    font-size: 10px;
  }

  /* ── Editor Panel ── */
  .editor-panel {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Image pane */
  .image-pane {
    flex: 1;
    overflow: auto;
    background: #080808;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 16px;
  }
  .image-wrapper {
    position: relative;
    display: inline-block;
    border: 1px solid var(--border);
  }
  .image-wrapper img {
    display: block;
    max-width: 100%;
    height: auto;
  }
  .image-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .overlay-rect {
    stroke-width: 3;
    stroke-opacity: 1;
    transition: fill-opacity 0.2s;
    pointer-events: all;
    cursor: pointer;
  }
  .overlay-rect.warn { stroke: #d4826a; fill: #d4826a; }
  .overlay-rect.checked { stroke: #6a9d6e; fill: #6a9d6e; }
  .overlay-rect.normal { stroke: #6a8db0; fill: #6a8db0; stroke-opacity: 0; }
  .overlay-rect.normal:hover { fill-opacity: 0.2; stroke-opacity: 0.6; }
  .overlay-rect.flash { stroke: #fff; fill: #fff; fill-opacity: 0.6 !important; stroke-opacity: 1 !important; }
  .overlay-rect.manual { stroke: #6a8db0; fill: #6a8db0; }
  #drawRect {
    position: absolute;
    border: 2px dashed #c8a96e;
    background: rgba(200,169,110,0.1);
    pointer-events: none;
    display: none;
  }
  .image-wrapper.drawing { cursor: crosshair; }

  /* OCR pane */
  .ocr-pane {
    width: 380px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .ocr-pane-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    background: var(--bg2);
  }
  .ocr-pane-title {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: auto;
  }
  .threshold-control {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text3);
  }
  .threshold-input {
    width: 48px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 11px;
    text-align: center;
  }

  .block-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .block-item {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg2);
    transition: all 0.15s;
  }
  .block-item:hover { border-color: var(--border2); }
  .block-item.warn {
    border-color: var(--warn);
    background: rgba(212, 130, 106, 0.05);
  }
  .block-item.checked {
    border-color: var(--ok);
    background: rgba(106, 157, 110, 0.05);
  }
  .block-item.active-block {
    border-color: var(--blue) !important;
    background: rgba(106, 141, 176, 0.08) !important;
    box-shadow: 0 0 0 1px var(--blue);
  }
  .overlay-rect.active-rect { stroke: #6a8db0; fill: #6a8db0; }

  .block-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .block-id {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text3);
    background: var(--bg3);
    padding: 1px 5px;
    border-radius: 2px;
  }
  .block-conf {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
  }
  .conf-ok { color: var(--ok); }
  .conf-warn { color: var(--warn); }
  .block-check {
    margin-left: auto;
    accent-color: var(--ok);
    cursor: pointer;
    width: 14px; height: 14px;
  }

  .block-text {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    outline: none;
    width: 100%;
    font-family: var(--font-serif);
    cursor: text;
    min-height: 20px;
  }
  .block-text:focus {
    background: var(--bg3);
    border-radius: 2px;
    padding: 2px 4px;
  }

  /* warn list */
  .warn-summary {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
  }
  .warn-count { color: var(--warn); font-weight: 600; }

  /* ── Empty states ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text3);
    font-size: 13px;
  }
  .empty-icon { font-size: 32px; opacity: 0.3; }

  /* ── Modals ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    display: none;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 24px;
    width: 400px;
    max-width: 90vw;
  }
  .modal-title {
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 16px;
    letter-spacing: 0.1em;
  }
  .form-group {
    margin-bottom: 14px;
  }
  .form-label {
    display: block;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 4px;
    font-family: var(--font-serif);
    font-size: 13px;
    outline: none;
  }
  .form-input:focus { border-color: var(--accent2); }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 18px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text);
    z-index: 200;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  .toast.success { border-color: var(--ok); }
  .toast.error { border-color: var(--warn); }

  /* ── Export Modal ── */
  .modal.modal-wide {
    width: 720px;
    max-width: 95vw;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
  }
  .export-layout {
    display: flex;
    gap: 16px;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }
  .export-settings {
    width: 220px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .export-preview {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }
  .export-preview-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .export-preview-area {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.8;
    padding: 10px;
    resize: none;
    border-radius: 2px;
    overflow-y: auto;
    min-height: 300px;
  }
  .export-range {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .export-range input[type=number] {
    width: 52px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 4px 6px;
    font-size: 11px;
    border-radius: 2px;
    text-align: center;
  }
  .separator-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 5px 8px;
    font-size: 11px;
    font-family: var(--font-mono);
    border-radius: 2px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text2);
  }
  .toggle-row input[type=checkbox] { cursor: pointer; }

  /* ── Resizer ── */
  .resizer-horizontal {
    height: 5px;
    width: 100%;
    cursor: row-resize;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .resizer-horizontal:hover, .resizer-horizontal.dragging { background: var(--accent2); }
  .resizer {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .resizer:hover, .resizer.dragging { background: var(--accent2); }

  /* ── Upload zone ── */
  .upload-zone {
    border: 1px dashed var(--border2);
    border-radius: 6px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text3);
    font-size: 12px;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent2); color: var(--text2); }



  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Text Preview Panel ── */
  .text-preview-panel {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    height: 220px;
    min-height: 36px;
    max-height: 80vh;
    transition: height 0.2s;
  }
  .text-preview-panel.collapsed { height: 36px !important; min-height: 36px; overflow: hidden; }
  .text-preview-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
    user-select: none;
  }
  .text-preview-header:hover { background: var(--bg3); }
  .text-preview-title {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
    flex: 1;
  }
  .text-preview-body {
    flex: 1;
    overflow: hidden;
    padding: 8px 12px;
    display: flex;
    gap: 8px;
  }
  .text-preview-textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.7;
    padding: 8px;
    resize: none;
    border-radius: 2px;
    overflow-y: auto;
  }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ocr-status {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    padding: 4px 10px;
  }

  .highlight-list {
    padding: 6px 8px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    max-height: 120px;
    overflow-y: auto;
  }
  .highlight-title {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 4px;
  }
  .highlight-item {
    font-size: 11px;
    color: var(--warn);
    cursor: pointer;
    padding: 2px 0;
    font-family: var(--font-mono);
  }
  .highlight-item:hover { color: var(--text); }

  /* ════ Light theme overrides ════ */
  [data-theme="light"] header {
    background: #0f3a5e;
    border-bottom: 1px solid #082840;
  }
  [data-theme="light"] .logo { color: #74c0e0; }
  [data-theme="light"] .logo span { color: #3a7a9e; }
  [data-theme="light"] .header-path { color: #9ad0ea; }
  [data-theme="light"] #langBtn,
  [data-theme="light"] #themeBtn {
    border-color: rgba(255,255,255,0.6) !important;
    color: #ffffff !important;
    background: rgba(255,255,255,0.12) !important;
  }
  [data-theme="light"] #langBtn:hover,
  [data-theme="light"] #themeBtn:hover {
    border-color: #ffffff !important;
    color: #ffffff !important;
    background: rgba(255,255,255,0.28) !important;
  }
  [data-theme="light"] .sidebar {
    background: #f5fafd;
    border-right-color: #bdd0e0;
  }
  [data-theme="light"] .sidebar-header {
    background: #dceef8;
    border-bottom-color: #bdd0e0;
  }
  [data-theme="light"] .sidebar-title { color: #1e4060; font-weight: 700; letter-spacing: 0.12em; }
  [data-theme="light"] .btn-icon { border-color: #bdd0e0; color: #1e4060; }

<body>

<header>
  <div class="logo">OCR <span>//</span> Project Manager</div>
  <div class="header-path" id="headerPath"></div>
  <button onclick="toggleLang()" id="langBtn" 
          style="margin-left:auto;background:none;border:1px solid var(--border2);color:var(--text2);
                 padding:3px 10px;border-radius:3px;cursor:pointer;font-size:11px;font-family:var(--font-mono);
                 letter-spacing:0.05em">EN</button>
  <button onclick="toggleTheme()" id="themeBtn" style="background:none;border:1px solid var(--border2);color:var(--text2);padding:3px 8px;border-radius:3px;cursor:pointer;font-size:13px;line-height:1">🌙</button>
</header>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Projects</span>
      <button class="btn-icon" onclick="openNewProjectModal()" title="新規プロジェクト">＋</button>
    </div>
    <div class="project-list" id="projectList"></div>
  </div>

  <!-- Main -->
  <div class="main" id="main">
    <div class="welcome">
      <div class="welcome-icon">卷</div>
      <div class="welcome-text" id="welcomeText">プロジェクトを選択、または新規作成してください</div>
    </div>
  </div>
</div>

<!-- Edit Project Modal -->
<div class="modal-overlay" id="editProjectModal">
  <div class="modal">
    <div class="modal-title">プロジェクトを編集</div>
    <div class="form-group">
      <label class="form-label" id="labelEditName">プロジェクト名</label>
      <input class="form-input" id="editProjectName" placeholder="プロジェクト名" />
    </div>
    <div class="form-group">
      <label class="form-label" id="labelEditDesc">説明</label>
      <input class="form-input" id="editProjectDesc" placeholder="説明（任意）" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('editProjectModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEditProject()">保存</button>
    </div>
  </div>
</div>

<!-- New Project Modal -->
<div class="modal-overlay" id="newProjectModal">
  <div class="modal">
    <div class="modal-title">新規プロジェクト</div>
    <div class="form-group">
      <label class="form-label" id="labelNewName">プロジェクト名</label>
      <input class="form-input" id="newProjectName" placeholder="例: タイトル" />
    </div>
    <div class="form-group">
      <label class="form-label" id="labelNewDesc">説明（任意）</label>
      <input class="form-input" id="newProjectDesc" placeholder="テキスト等" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('newProjectModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="createProject()">作成</button>
    </div>
  </div>
</div>

<!-- Manual Block Modal -->
<div class="modal-overlay" id="manualBlockModal">
  <div class="modal">
    <div class="modal-title">テキストを入力</div>
    <div class="form-group">
      <label class="form-label" id="labelManualText">テキスト</label>
      <textarea class="form-input" id="manualBlockText" rows="4" 
                placeholder="認識できなかったテキストを入力"
                style="resize:vertical;line-height:1.8"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label" id="labelWritingDir">縦書き</label>
      <select class="form-input" id="manualBlockVertical" style="width:auto">
        <option value="true" id="optVertical">縦書き</option>
        <option value="false" id="optHorizontal">横書き</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="cancelManualBlock()">キャンセル</button>
      <button class="btn btn-primary" onclick="confirmManualBlock()" id="btnManualBlockAdd">追加</button>
    </div>
  </div>
</div>

<!-- Add File Modal -->
<div class="modal-overlay" id="addFileModal">
  <div class="modal">
    <div class="modal-title">ファイルを追加</div>

    <!-- Drop Zone -->
    <div id="addFileDropZone" style="
      border: 2px dashed var(--border2);
      border-radius: 6px;
      padding: 28px 16px;
      text-align: center;
      margin-bottom: 16px;
      cursor: pointer;
      transition: border-color 0.2s;
    "
    ondragover="event.preventDefault(); this.style.borderColor='var(--accent)'"
    ondragleave="this.style.borderColor='var(--border2)'"
    ondrop="handleAddFileDrop(event)"
    onclick="document.getElementById('addFileInput').click()"
    >
      <div style="font-size:24px;margin-bottom:8px;opacity:0.4">⊕</div>
      <div style="font-size:12px;color:var(--text2)">ここにドロップ、またはクリックして選択</div>
      <div style="font-size:10px;color:var(--text3);margin-top:6px" id="addFileImgNote">画像: PNG / JPG / JPEG / TIFF / JP2 / BMP</div>
      <div id="addFilePdfNote" style="font-size:10px;color:var(--text3);margin-top:2px;display:none">PDF: ページ数が多い場合、変換に時間がかかります</div>
    </div>

    <!-- Hidden inputs -->
    <input type="file" id="addFileInput" accept=".png,.jpg,.jpeg,.tiff,.tif,.jp2,.bmp" multiple style="display:none" onchange="handleAddFileInput(event)">
    <input type="file" id="addPdfInput" accept=".pdf" style="display:none" onchange="handleAddPdfInput(event)">
    <!-- Paste Button (always visible) -->
    <div style="margin-bottom:12px">
      <button class="btn" id="addFilePasteBtn" style="width:100%" onclick="pasteImageFromClipboard()"></button>
    </div>

    <!-- Image Button (always visible) -->
    <div style="margin-bottom:12px">
      <button class="btn" id="addFileImgBtnButton" style="width:100%" onclick="document.getElementById('addFileInput').click()"></button>
    </div>

    <!-- PDF Button (v2 only) -->
    <div id="addFilePdfBtn" style="display:none;margin-bottom:12px">
      <button class="btn" style="width:100%" onclick="document.getElementById('addPdfInput').click()">
        📄 PDFを追加（別途選択）
      </button>
    </div>

    <!-- Progress -->
    <div id="addFileProgress" style="display:none;font-size:11px;color:var(--text2);margin-bottom:12px;font-family:var(--font-mono)"></div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal('addFileModal')">閉じる</button>
    </div>
  </div>
</div>

<!-- Figure Crop Modal -->
<div class="modal-overlay" id="figureCropModal">
  <div class="modal">
    <div class="modal-title">図表を追加</div>
    <div class="form-group">
      <label class="form-label">タイトル（ファイル名になります）</label>
      <input class="form-input" id="figureTitleInput" placeholder="例: 図1_新聞記事写真" />
    </div>
    <div class="form-group">
      <label class="form-label">キャプション（任意）</label>
      <textarea class="form-input" id="figureCaptionInput" rows="3" placeholder="例: 昭和60年5月5日 東京新聞" style="resize:vertical;line-height:1.8"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="cancelFigureCrop()">キャンセル</button>
      <button class="btn btn-primary" onclick="confirmFigureCrop()">追加</button>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal modal-wide">
    <div class="modal-title" id="labelExportTitle">統合出力</div>
    <div class="export-layout">

      <!-- Settings column -->
      <div class="export-settings">
        <div class="form-group" style="margin:0">
          <label class="form-label" id="labelExportFormat">出力形式</label>
          <select class="form-input" id="exportFormat" onchange="updateExportPreview()">
            <option value="txt" id="optExportTxt">TXT</option>
            <option value="json" id="optExportJson">JSON</option>
          </select>
        </div>

        <div class="form-group" style="margin:0">
          <label class="form-label" id="labelExportRange">ページ範囲</label>
          <div class="export-range">
            <span id="labelExportFrom">From</span>
            <input type="number" id="exportFrom" min="1" value="1" onchange="updateExportPreview()">
            <span id="labelExportTo">To</span>
            <input type="number" id="exportTo" min="1" value="1" onchange="updateExportPreview()">
          </div>
        </div>

        <div class="form-group" style="margin:0">
          <div class="toggle-row">
            <input type="checkbox" id="exportSeparator" checked onchange="toggleSeparatorInput(); updateExportPreview()">
            <label for="exportSeparator" id="labelSeparatorToggle">ページ区切りを入れる</label>
          </div>
        </div>

        <div class="form-group" style="margin:0" id="separatorGroup">
          <label class="form-label" id="labelSeparatorText">区切り文字</label>
          <input class="separator-input" id="separatorText" value="--- p.{n} ---" oninput="updateExportPreview()">
          <div style="font-size:9px;color:var(--text3);margin-top:3px">{n} = ページ番号</div>
        </div>

        <div class="form-group" style="margin:0;border-top:1px solid var(--border);padding-top:10px">
          <div class="toggle-row">
            <input type="checkbox" id="exportParaSeparator" checked onchange="toggleParaSepInput(); updateExportPreview()">
            <label for="exportParaSeparator" id="labelParaSepToggle">¶ 段落区切りを反映</label>
          </div>
        </div>

        <div class="form-group" style="margin:0" id="paraSeparatorGroup">
          <label class="form-label" id="labelParaSepText">段落区切り文字</label>
          <input class="separator-input" id="paraSeparatorText" value="" placeholder="（空行を挿入）" oninput="updateExportPreview()">
          <div style="font-size:9px;color:var(--text3);margin-top:3px" id="paraSepNote">空欄 = 空行を挿入</div>
        </div>

        <div class="form-group" style="margin:0;border-top:1px solid var(--border);padding-top:10px">
          <div class="toggle-row">
            <input type="checkbox" id="exportIndent" onchange="updateExportPreview()">
            <label for="exportIndent" id="labelIndentToggle">¶ ブロックの先頭に一字下げ</label>
          </div>
          <div style="font-size:9px;color:var(--text3);margin-top:3px" id="indentNote">段落先頭に全角スペースを自動付与</div>
        </div>
      </div>

      <!-- Preview column -->
      <div class="export-preview">
        <div class="export-preview-label" id="labelExportPreview">Preview</div>
        <textarea class="export-preview-area" id="exportPreviewArea" readonly></textarea>
      </div>
    </div>

    <div class="modal-actions" style="margin-top:12px">
      <button class="btn" onclick="closeModal('exportModal')" id="btnExportCancel">キャンセル</button>
      <button class="btn" onclick="copyExportPreview()" id="btnExportCopy">コピー</button>
      <button class="btn btn-primary" onclick="doExport()" id="btnExportDo">出力</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── Page List ────────────────────────────────────────────────────────────────
function renderPageList() {
  const el = document.getElementById('pageList');
  if (!el) return;
  if (state.pages.length === 0) {
    el.innerHTML = `<div style="padding:12px;font-size:11px;color:var(--text3);text-align:center">${t('noImages')}</div>`;
    return;
  }
  el.innerHTML = state.pages.map((p, i) => {
    const active = state.currentPage === p.name ? 'active' : '';
    let dotClass = 'dot-none';
    let statusText = 'OCR ' + (lang === 'ja' ? '未実行' : 'Pending');
    if (p.has_ocr) {
      dotClass = p.checked_count === p.total_count && p.total_count > 0 ? 'dot-done' : 'dot-pending';
      statusText = t('checkedStatus', p.checked_count, p.total_count);
    }
    return `
    <div class="page-item ${active}" 
         onclick="selectPage('${p.name}')"
         draggable="true"
         data-index="${i}"
         ondragstart="dragStart(event, ${i})"
         ondragover="dragOver(event)"
         ondrop="dragDrop(event, ${i})">
      <div style="display:flex;align-items:center;gap:4px">
        <span class="drag-handle">⠿</span>
        <span class="page-item-name" title="${p.name}">${p.name}</span>
        <button class="btn-icon" style="margin-left:auto;flex-shrink:0;color:var(--warn);border-color:transparent"
          onclick="event.stopPropagation();deletePage('${p.name}')" title="削除">×</button>
      </div>
      <div class="page-item-status">
        <span class="status-dot ${dotClass}"></span>${statusText}
      </div>
    </div>`;
  }).join('');
}

// ── Drag & Drop ──────────────────────────────────────────────────────────────
function dragStart(e, index) {
  state.dragSrcIndex = index;
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
async function dragDrop(e, targetIndex) {
  e.preventDefault();
  if (state.dragSrcIndex === null || state.dragSrcIndex === targetIndex) return;
  const pages = [...state.pages];
  const [moved] = pages.splice(state.dragSrcIndex, 1);
  pages.splice(targetIndex, 0, moved);
  state.pages = pages;
  state.dragSrcIndex = null;
  renderPageList();
  // Save order
  await fetch(`/api/projects/${encodeURIComponent(state.currentProject)}/pages/order`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ order: pages.map(p => p.name) }),
  });
}

// ── Select Page ──────────────────────────────────────────────────────────────
async function selectPage(name) {
  state.currentPage = name;
  renderPageList();
  updateHeaderPath();

  const editorPanel = document.getElementById('editorPanel');
  editorPanel.innerHTML = `
  <div class="empty-state">
    <div class="spinner"></div>
    <div>${t('loading')}</div>
  </div>`;

  const res = await fetch(`/api/projects/${encodeURIComponent(state.currentProject)}/page/${encodeURIComponent(name)}`);
  if (!res.ok) {
    // No OCR data yet
    editorPanel.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">？</div>
      <div>${t('noOcr')}</div>
      <button class="btn btn-primary" onclick="runOcrSingle('${name}')">${t('runOcr')}</button>
    </div>`;
    return;
  }

  state.pageData = await res.json();
  // overlayをサーバーから受け取ったものをベースに、ブロックの_*値でも補完
  const rawOverlay = state.pageData.overlay || {};
  const mergedOverlay = {};
  (state.pageData.ocr.contents?.[0] || []).forEach(block => {
    const bid = String(block.id);
    mergedOverlay[bid] = Object.assign({}, rawOverlay[bid] || {});
    if (block._text !== undefined && mergedOverlay[bid].text === undefined)
      mergedOverlay[bid].text = block._text;
    if (block._checked !== undefined && mergedOverlay[bid].checked === undefined)
      mergedOverlay[bid].checked = block._checked;
    if (block._confidence !== undefined && mergedOverlay[bid].confidence === undefined)
      mergedOverlay[bid].confidence = block._confidence;
  });
  state.overlay = mergedOverlay;
  state.threshold = state.pageData.confidence_threshold || 0.9;
  renderEditor();
  setTimeout(initTextPreview, 50);
}

function renderBlockList() {
  const el = document.getElementById('blockList');
  if (!el) return;
  const blocks = state.pageData.ocr.contents?.[0] || [];
  const lastIdx = blocks.length - 1;

  el.innerHTML = blocks.map((block, i) => {
    const bid = String(block.id);
    const ov = state.overlay[bid] || {};
    // _text/_checked/_confidenceはサーバーがoverlayをマージした値、なければoverlayから、なければブロック本体
    const text = ov.text !== undefined ? ov.text : (block._text !== undefined ? block._text : (block.text || ''));
    const conf = ov.confidence !== undefined ? ov.confidence : (block._confidence !== undefined ? block._confidence : (block.confidence || 1));
    const isChecked = ov.checked !== undefined ? ov.checked : (block._checked || false);
    const isWarn = conf < state.threshold && !isChecked;
    const isVert = block.isVertical === 'true' || block.isVertical === true;
    const isActive = state.activeBlockId === block.id;

    let cls = '';
    if (isActive) cls = 'active-block';
    else if (isChecked) cls = 'checked';
    else if (isWarn) cls = 'warn';

    return `
    <div class="block-item ${cls}" id="block-${block.id}"
         data-block-index="${i}"
         onclick="setActiveBlock(${block.id})">
      <div class="block-header">
        <!-- ↑↓ 移動ボタン -->
        <span style="display:flex;flex-direction:column;gap:1px;margin-right:4px;flex-shrink:0">
          <button ${i===0?'disabled':''} onclick="event.stopPropagation();moveBlockUpDown(${block.id},-1)"
            style="background:none;border:1px solid var(--border2);color:${i===0?'var(--text3)':'var(--text2)'};
                   cursor:${i===0?'default':'pointer'};width:16px;height:13px;border-radius:2px;
                   font-size:8px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center"
            title="${lang==='ja'?'上へ移動':'Move up'}">▲</button>
          <button ${i===lastIdx?'disabled':''} onclick="event.stopPropagation();moveBlockUpDown(${block.id},1)"
            style="background:none;border:1px solid var(--border2);color:${i===lastIdx?'var(--text3)':'var(--text2)'};
                   cursor:${i===lastIdx?'default':'pointer'};width:16px;height:13px;border-radius:2px;
                   font-size:8px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center"
            title="${lang==='ja'?'下へ移動':'Move down'}">▼</button>
        </span>
        <span class="block-id">#${block.id}</span>
        <span class="block-conf ${isWarn ? 'conf-warn' : 'conf-ok'}">${conf.toFixed(3)}</span>
        <!-- 文字方向トグル -->
        <button onclick="event.stopPropagation();toggleBlockVertical(${block.id})"
          style="background:none;border:1px solid var(--border2);cursor:pointer;
                 font-size:9px;padding:1px 5px;border-radius:2px;line-height:1.4;
                 color:${isVert ? 'var(--accent)' : 'var(--text3)'};
                 border-color:${isVert ? 'var(--accent2)' : 'var(--border2)'}"
          title="${lang==='ja'?'文字方向を切り替え（縦↔横）':'Toggle writing direction (V↔H)'}">
          ${isVert ? (lang==='ja'?'縦':'V') : (lang==='ja'?'横':'H')}
        </button>
        ${block.manual ? `<span style="font-size:9px;color:var(--blue)">${lang==='ja'?'手動':'manual'}</span>` : ''}
        <span style="display:flex;align-items:center;gap:2px;margin-left:4px">
          <span style="font-size:9px;color:var(--text3)">→#</span>
          <input type="number" min="0" value="${block.id}"
            style="width:36px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
                   font-family:var(--font-mono);font-size:10px;padding:1px 3px;border-radius:2px;text-align:center"
            title="${lang==='ja'?'移動先の番号を入力してEnter':'Enter target position and press Enter'}"
            onkeydown="if(event.key==='Enter') moveBlockTo(${block.id}, parseInt(this.value))"
            onblur="this.value=${block.id}"
            onclick="event.stopPropagation()">
        </span>
        <button onclick="event.stopPropagation();toggleParaBreak(${block.id})"
                style="background:none;border:none;cursor:pointer;font-size:13px;padding:0 2px;line-height:1;
                       color:${ov.paragraph_break ? '#c8a96e' : 'var(--text3)'}"
                title="${ov.paragraph_break ? (lang==='ja'?'段落区切りを解除':'Remove paragraph break') : (lang==='ja'?'ここで段落区切り':'Paragraph break here')}">¶</button>
        <input type="checkbox" class="block-check" ${isChecked ? 'checked' : ''}
               onchange="toggleCheck(${block.id}, this.checked)" title="${lang==='ja'?'確認済み':'Confirmed'}"
               onclick="event.stopPropagation()">
        <button onclick="event.stopPropagation();deleteBlock(${block.id})"
                style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:0 2px;line-height:1"
                title="${t('blockDelete')}">×</button>
      </div>
      <div class="block-text" contenteditable="true"
           onfocus="setActiveBlock(${block.id})"
           onblur="saveText(${block.id}, this.innerText)"
           id="text-${block.id}">${text}</div>

  }).join('');
}

// ── Paragraph Break ──────────────────────────────────────────────────────────
async function toggleParaBreak(blockId) {
  const ov = getOrCreateOverlay(blockId);
  ov.paragraph_break = !ov.paragraph_break;
  await persistOverlay();
  renderBlockList();
}

// ── Delete Block ─────────────────────────────────────────────────────────────
async function deleteBlock(blockId) {
  const blocks = state.pageData.ocr.contents[0];
  const idx = blocks.findIndex(b => b.id === blockId);
  if (idx === -1) return;
  blocks.splice(idx, 1);

  // overlayからも削除
  delete state.overlay[String(blockId)];

  // サーバー保存
  await persistOverlay();
  await fetch(
    `/api/projects/${encodeURIComponent(state.currentProject)}/page/${encodeURIComponent(state.currentPage)}/delete_block`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ block_id: blockId }),
    }
  );

  // 削除後もIDを振り直す
  renumberBlocks();
  await persistOverlay();
  await fetch(
    `/api/projects/${encodeURIComponent(state.currentProject)}/page/${encodeURIComponent(state.currentPage)}/reorder`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ blocks: state.pageData.ocr.contents[0] }),
    }
  );
  renderBlockList();
  renderOverlay();
  toast(t('toastBlockDeleted'), '');
}

// ── Block Move Up/Down ────────────────────────────────────────────────────────
async function moveBlockUpDown(blockId, direction) {
  const blocks = state.pageData.ocr.contents[0];
  const srcIdx = blocks.findIndex(b => b.id === blockId);
  if (srcIdx === -1) return;
  const destIdx = srcIdx + direction;
  if (destIdx < 0 || destIdx >= blocks.length) return;

  const [moved] = blocks.splice(srcIdx, 1);
  blocks.splice(destIdx, 0, moved);

  renumberBlocks();

  await fetch(
    `/api/projects/${encodeURIComponent(state.currentProject)}/page/${encodeURIComponent(state.currentPage)}/reorder`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ blocks: state.pageData.ocr.contents[0] }),
    }
  );
  await persistOverlay();
  renderBlockList();
  renderOverlay();
  setTimeout(() => {
    setActiveBlock(destIdx);
    const el = document.getElementById(`block-${destIdx}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 30);
}

// ── Active Block Highlight ────────────────────────────────────────────────────
function setActiveBlock(blockId) {
  state.activeBlockId = blockId;
  document.querySelectorAll('.block-item.active-block').forEach(el => el.classList.remove('active-block'));
  const el = document.getElementById(`block-${blockId}`);
  if (el) el.classList.add('active-block');
  // SVGオーバーレイのアクティブ枠を更新
  document.querySelectorAll('.overlay-rect.active-rect').forEach(r => {
    r.classList.remove('active-rect');
    const isNormal = !r.classList.contains('warn') && !r.classList.contains('checked');
    r.setAttribute('fill-opacity', isNormal ? 0 : state.overlayOpacity);
    r.setAttribute('stroke-opacity', isNormal ? 0 : 1);
  });
  const rect = document.getElementById(`rect-${blockId}`);
  if (rect) {
    rect.classList.add('active-rect');
    rect.setAttribute('fill-opacity', Math.min(1, state.overlayOpacity + 0.35));
    rect.setAttribute('stroke-opacity', 1);
  }
}

// ── Toggle Block Writing Direction ───────────────────────────────────────────
async function toggleBlockVertical(blockId) {
  const blocks = state.pageData.ocr.contents[0];
  const block = blocks.find(b => b.id === blockId);
  if (!block) return;
  const isVert = block.isVertical === 'true' || block.isVertical === true;
  block.isVertical = isVert ? 'false' : 'true';

  await fetch(
    `/api/projects/${encodeURIComponent(state.currentProject)}/page/${encodeURIComponent(state.currentPage)}/reorder`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ blocks: state.pageData.ocr.contents[0] }),
    }
  );
  renderBlockList();
  setTimeout(() => setActiveBlock(blockId), 30);
}

async function moveBlockTo(blockId, targetPos) {
  const blocks = state.pageData.ocr.contents[0];
  const srcIdx = blocks.findIndex(b => b.id === blockId);
  if (srcIdx === -1) return;
  const maxPos = blocks.length - 1;
  const destIdx = Math.max(0, Math.min(maxPos, targetPos));
  if (srcIdx === destIdx) return;

  const [moved] = blocks.splice(srcIdx, 1);
  blocks.splice(destIdx, 0, moved);

  renumberBlocks();

  await fetch(
    `/api/projects/${encodeURIComponent(state.currentProject)}/page/${encodeURIComponent(state.currentPage)}/reorder`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ blocks: state.pageData.ocr.contents[0] }),
    }
  );
  await persistOverlay();
  renderBlockList();
  renderOverlay();
  // 移動後のブロックにスクロール
  setTimeout(() => scrollToBlock(destIdx), 50);
}

function renumberBlocks() {
  const blocks = state.pageData.ocr.contents[0];
  const newOverlay = {};
  blocks.forEach((block, i) => {
    const oldId = String(block.id);
    const newId = i;
    // overlayのキーを新IDに移し替え
    if (state.overlay[oldId]) {
      newOverlay[String(newId)] = state.overlay[oldId];
    }
    // activeBlockIdも新IDに追従させる
    if (state.activeBlockId === block.id) {
      state.activeBlockId = newId;
    }
    block.id = newId;
  });
  state.overlay = newOverlay;
}

function scrollToBlock(id) {
  const el = document.getElementById(`block-${id}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  setActiveBlock(id);
}

function flashOverlayRect(blockId) {
  const rect = document.getElementById(`rect-${blockId}`);
  if (!rect) return;
  rect.classList.add('flash');
  setTimeout(() => rect.classList.remove('flash'), 600);
}

function renderOverlay() {
  const svg = document.getElementById('imageOverlay');
  const img = document.getElementById('pageImage');
  if (!svg || !img || !state.pageData) return;

  const imgInfo = state.pageData.ocr.imginfo || {};
  const imgW = imgInfo.img_width || img.naturalWidth || 1;
  const imgH = imgInfo.img_height || img.naturalHeight || 1;

  svg.setAttribute('viewBox', `0 0 ${imgW} ${imgH}`);
  const blocks = state.pageData.ocr.contents?.[0] || [];

  svg.innerHTML = blocks.map(block => {
    const bid = String(block.id);
    const ov = state.overlay[bid] || {};
    const bb = block.boundingBox;
    if (!bb || bb.length < 2) return '';

    // boundingBoxは[[x1,y1],[x2,y2],[x3,y3],[x4,y4]]または[[x1,y1],[x2,y2]]
    const xs = bb.map(p => p[0]);
    const ys = bb.map(p => p[1]);
    const x = Math.min(...xs);
    const y = Math.min(...ys);
    const w = Math.max(...xs) - x;
    const h = Math.max(...ys) - y;

    const conf = block.confidence || 1;
    const isChecked = ov.checked || false;
    const isWarn = conf < state.threshold && !isChecked;
    const isActive = state.activeBlockId === block.id;
    const cls = isActive ? 'active-rect' : (isChecked ? 'checked' : (isWarn ? 'warn' : 'normal'));

    const fillOp = isActive ? Math.min(1, state.overlayOpacity + 0.35) : (cls === 'normal' ? 0 : state.overlayOpacity);
    const strokeOp = cls === 'normal' ? 0 : 1;
    return `<rect id="rect-${block.id}" class="overlay-rect ${cls}"
      x="${x}" y="${y}" width="${w}" height="${h}"
      fill-opacity="${fillOp}" stroke-opacity="${strokeOp}"
      onclick="scrollToBlock(${block.id})" />`;
  }).join('');
}

// ── 一括チェック ──────────────────────────────────────────────────────────────
async function checkAll() {
  const blocks = state.pageData.ocr.contents?.[0] || [];
  blocks.forEach(block => {
    const ov = getOrCreateOverlay(block.id);
    ov.checked = true;

  await persistOverlay();
  renderBlockList();
  renderOverlay();

async function checkAboveThreshold() {
  const blocks = state.pageData.ocr.contents?.[0] || [];
  let count = 0;
  blocks.forEach(block => {
    const conf = block.confidence || 1;
    if (conf >= state.threshold) {
      const ov = getOrCreateOverlay(block.id);
      ov.checked = true;
      ov.confidence = 1.0;
      count++;
    }
  });
  await persistOverlay();
  renderBlockList();
  renderOverlay();
  loadPages(state.currentProject).then(renderPageList);
  toast(t('toastCheckThreshold', count), 'success');
}

function updateOverlayOpacity(val) {

  const svg = document.getElementById('imageOverlay');

// ── 範囲指定手動追加 ──────────────────────────────────────────────────────────
let cropState = { active: false, drawing: false, startX:0, startY:0, startPX:0, startPY:0, pendingBB: null };

let drawState = {
  active: false,  // 描画モードON/OFF
  drawing: false, // ドラッグ中
  startX: 0, startY: 0,
  pendingBB: null, // 確定前のboundingBox（画像座標系）
};

// ── 図表クロップモード ──────────────────────────────────────────
function toggleCropMode() {
  if (drawState.active) toggleDrawMode();
  cropState.active = !cropState.active;
  const btn = document.getElementById('cropModeBtn');
  const wrapper = document.getElementById('imageWrapper');
  if (btn) { btn.style.borderColor = cropState.active ? 'var(--ok)' : ''; btn.style.color = cropState.active ? 'var(--ok)' : ''; }
  if (wrapper) wrapper.classList.toggle('drawing', cropState.active);
  if (!cropState.active) { const dr = document.getElementById('drawRect'); if (dr) dr.style.display = 'none'; }
}

function cropDrawStart(e) {
  if (!cropState.active) return;
  e.preventDefault();
  const coords = getImageCoords(e);
  if (!coords) return;
  cropState.drawing = true;
  cropState.startX = coords.x; cropState.startY = coords.y;
  cropState.startPX = coords.px; cropState.startPY = coords.py;
  const dr = document.getElementById('drawRect');
  if (dr) {
    dr.style.display = 'block';
    dr.style.borderColor = 'var(--ok)';
    dr.style.background = 'rgba(106,157,110,0.1)';
    dr.style.left = coords.px + 'px'; dr.style.top = coords.py + 'px';
    dr.style.width = '0'; dr.style.height = '0';
  }
}

function cropDrawMove(e) {
  if (!cropState.active || !cropState.drawing) return;
  e.preventDefault();
  const coords = getImageCoords(e);
  if (!coords) return;
  const dr = document.getElementById('drawRect');
  if (!dr) return;
  dr.style.left = Math.min(cropState.startPX, coords.px) + 'px';
  dr.style.top = Math.min(cropState.startPY, coords.py) + 'px';
  dr.style.width = Math.abs(coords.px - cropState.startPX) + 'px';
  dr.style.height = Math.abs(coords.py - cropState.startPY) + 'px';
}

function cropDrawEnd(e) {
  if (!cropState.active || !cropState.drawing) return;
  e.preventDefault();
  cropState.drawing = false;
  const coords = getImageCoords(e);
  if (!coords) return;
  const dr = document.getElementById('drawRect');
  if (dr) dr.style.display = 'none';
  const x1 = Math.min(cropState.startX, coords.x), y1 = Math.min(cropState.startY, coords.y);
  const x2 = Math.max(cropState.startX, coords.x), y2 = Math.max(cropState.startY, coords.y);
  if (x2 - x1 < 5 || y2 - y1 < 5) return;
  cropState.pendingBB = { x1, y1, x2, y2 };
  document.getElementById('figureTitleInput').value = '';
  document.getElementById('figureCaptionInput').value = '';
  document.getElementById('figureCropModal').classList.add('open');
  setTimeout(() => document.getElementById('figureTitleInput').focus(), 100);
}

function cancelFigureCrop() {
  cropState.pendingBB = null;
  closeModal('figureCropModal');
}

async function confirmFigureCrop() {
  const title = document.getElementById('figureTitleInput').value.trim();
  const caption = document.getElementById('figureCaptionInput').value.trim();
  if (!title || !cropState.pendingBB) { closeModal('figureCropModal'); return; }
  const bb = cropState.pendingBB;
  const res = await fetch(
    `/api/projects/${encodeURIComponent(state.currentProject)}/page/${encodeURIComponent(state.currentPage)}/crop`,
    { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ x1: bb.x1, y1: bb.y1, x2: bb.x2, y2: bb.y2, title, caption }) }
  );
  const data = await res.json();
  if (!res.ok || data.error) { toast(data.error || 'クロップ失敗', 'error'); return; }
  const blocks = state.pageData.ocr.contents[0];
  const maxId = blocks.reduce((m, b) => Math.max(m, b.id || 0), 0);
  const newId = maxId + 1;
  const figureBlock = {
    id: newId, type: 'figure', manual: true,
    boundingBox: [[bb.x1,bb.y1],[bb.x1,bb.y2],[bb.x2,bb.y1],[bb.x2,bb.y2]],
    text: caption ? `[${title}] ${caption}` : `[${title}]`,
    confidence: 1.0, figure_title: title, figure_caption: caption, figure_file: data.filename,
  };
  blocks.push(figureBlock);
  const ov = getOrCreateOverlay(newId);
  ov.text = figureBlock.text; ov.checked = true; ov.confidence = 1.0; ov.manual = true;
  await persistOverlay();
  await fetch(
    `/api/projects/${encodeURIComponent(state.currentProject)}/page/${encodeURIComponent(state.currentPage)}/ocr_patch`,
    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ block: figureBlock }) }
  );
  cropState.pendingBB = null;
  closeModal('figureCropModal');
  toggleCropMode();
  renderBlockList(); renderOverlay();
  toast(lang === 'ja' ? `「${title}」を追加しました` : `Added "${title}"`, 'success');
}

function toggleDrawMode() {
  drawState.active = !drawState.active;
  const btn = document.getElementById('drawModeBtn');
  const wrapper = document.getElementById('imageWrapper');
  if (btn) btn.style.borderColor = drawState.active ? 'var(--accent)' : '';
  if (btn) btn.style.color = drawState.active ? 'var(--accent)' : '';
  if (wrapper) wrapper.classList.toggle('drawing', drawState.active);
  if (!drawState.active) {
    const dr = document.getElementById('drawRect');
    if (dr) dr.style.display = 'none';
  }
}

function getImageCoords(e) {
  const img = document.getElementById('pageImage');
  const wrapper = document.getElementById('imageWrapper');
  if (!img || !wrapper) return null;
  const rect = wrapper.getBoundingClientRect();
  const scaleX = (state.pageData.ocr.imginfo?.img_width || img.naturalWidth) / img.offsetWidth;
  const scaleY = (state.pageData.ocr.imginfo?.img_height || img.naturalHeight) / img.offsetHeight;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
    px: e.clientX - rect.left,
    py: e.clientY - rect.top,
  };
}

function drawStart(e) {
  if (cropState.active) { cropDrawStart(e); return; }
  if (!drawState.active) return;
  e.preventDefault();
  const coords = getImageCoords(e);
  if (!coords) return;
  drawState.drawing = true;
  drawState.startX = coords.x;
  drawState.startY = coords.y;
  drawState.startPX = coords.px;
  drawState.startPY = coords.py;
  const dr = document.getElementById('drawRect');
  if (dr) {
    dr.style.display = 'block';
    dr.style.left = coords.px + 'px';
    dr.style.top = coords.py + 'px';
    dr.style.width = '0';
    dr.style.height = '0';
  }
}

function drawMove(e) {
  if (cropState.active) { cropDrawMove(e); return; }
  if (!drawState.active || !drawState.drawing) return;
  e.preventDefault();
  const coords = getImageCoords(e);
  if (!coords) return;
  const dr = document.getElementById('drawRect');
  if (!dr) return;
  const x = Math.min(drawState.startPX, coords.px);
  const y = Math.min(drawState.startPY, coords.py);
  const w = Math.abs(coords.px - drawState.startPX);
  const h = Math.abs(coords.py - drawState.startPY);
  dr.style.left = x + 'px';
  dr.style.top = y + 'px';
  dr.style.width = w + 'px';
  dr.style.height = h + 'px';
}

function drawEnd(e) {
  if (cropState.active) { cropDrawEnd(e); return; }
  if (!drawState.active || !drawState.drawing) return;
  e.preventDefault();
  drawState.drawing = false;
  const coords = getImageCoords(e);
  if (!coords) return;
  const dr = document.getElementById('drawRect');
  if (dr) dr.style.display = 'none';

  const x1 = Math.min(drawState.startX, coords.x);
  const y1 = Math.min(drawState.startY, coords.y);
  const x2 = Math.max(drawState.startX, coords.x);
  const y2 = Math.max(drawState.startY, coords.y);

  if (x2 - x1 < 5 || y2 - y1 < 5) return; // 小さすぎる場合は無視

  drawState.pendingBB = [[x1,y1],[x1,y2],[x2,y1],[x2,y2]];

  // テキスト入力モーダルを開く
  document.getElementById('manualBlockText').value = '';
  document.getElementById('manualBlockModal').classList.add('open');
  setTimeout(() => document.getElementById('manualBlockText').focus(), 100);
}

function cancelManualBlock() {
  drawState.pendingBB = null;
  closeModal('manualBlockModal');
}

async function confirmManualBlock() {
  const text = document.getElementById('manualBlockText').value.trim();
  const isVertical = document.getElementById('manualBlockVertical').value;
  if (!text || !drawState.pendingBB) { closeModal('manualBlockModal'); return; }

  // 新しいブロックIDを生成（既存の最大ID+1）
  const blocks = state.pageData.ocr.contents?.[0] || [];
  const maxId = blocks.reduce((m, b) => Math.max(m, b.id || 0), 0);
  const newId = maxId + 1;

  // OCR JSONにブロックを追加
  state.pageData.ocr.contents[0].push({
    id: newId,
    boundingBox: drawState.pendingBB,
    text: text,
    confidence: 1.0,
    isVertical: isVertical,
    isTextline: 'true',
    manual: true,
  });

  // overlayにも追加（確認済み扱い）
  const ov = getOrCreateOverlay(newId);
  ov.text = text;
  ov.checked = true;
  ov.confidence = 1.0;
  ov.manual = true;

  // 保存
  await persistOverlay();
  await fetch(`/api/projects/${encodeURIComponent(state.currentProject)}/page/${encodeURIComponent(state.currentPage)}/ocr_patch`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ block: state.pageData.ocr.contents[0][state.pageData.ocr.contents[0].length - 1] }),
  });

  drawState.pendingBB = null;
  closeModal('manualBlockModal');
  toggleDrawMode(); // 描画モードを解除
  renderBlockList();
  renderOverlay();
  toast(t('toastBlockAdded', newId), 'success');
}

function updateThreshold(val) {
  state.threshold = parseFloat(val);
  fetch(`/api/projects/${encodeURIComponent(state.currentProject)}/settings`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ confidence_threshold: state.threshold }),
  });
  renderEditor();
}

// ── Overlay Operations ───────────────────────────────────────────────────────
function getOrCreateOverlay(blockId) {
  const bid = String(blockId);
  if (!state.overlay[bid]) state.overlay[bid] = {};
  return state.overlay[bid];
}

function saveText(blockId, text) {
  const ov = getOrCreateOverlay(blockId);
  // 先頭の全角スペース（段落字下げ）を保持しつつ、末尾の空白のみ除去
  const leadingSpaces = text.match(/^　*/)[0];
  const trimmed = text.trimEnd();
  ov.text = leadingSpaces + trimmed.slice(leadingSpaces.length);
  persistOverlay();
  updateBlockStyle(blockId);
}

function toggleCheck(blockId, checked) {
  const ov = getOrCreateOverlay(blockId);
  ov.checked = checked;
  // チェック済み=人間が確認済みなのでconfidenceを1.0に上書き
  if (checked) {
    ov.confidence = 1.0;
  } else {
    delete ov.confidence;
  }
  persistOverlay();
  updateBlockStyle(blockId);
  updateOverlayRect(blockId);
  // Update page list progress
  loadPages(state.currentProject).then(renderPageList);
}

function updateBlockStyle(blockId) {
  const el = document.getElementById(`block-${blockId}`);
  if (!el) return;
  const bid = String(blockId);
  const ov = state.overlay[bid] || {};
  const block = (state.pageData.ocr.contents?.[0] || []).find(b => b.id === blockId);
  // overlayのconfidenceを優先（チェック済みは1.0）
  const conf = ov.confidence !== undefined ? ov.confidence : (block?.confidence || 1);
  el.classList.remove('warn', 'checked');
  if (ov.checked) el.classList.add('checked');
  else if (conf < state.threshold) el.classList.add('warn');
}

function updateOverlayRect(blockId) {
  const rect = document.getElementById(`rect-${blockId}`);
  if (!rect) return;
  const bid = String(blockId);
  const ov = state.overlay[bid] || {};
  const block = (state.pageData.ocr.contents?.[0] || []).find(b => b.id === blockId);
  const conf = block?.confidence || 1;
  const isChecked = ov.checked || false;
  const isWarn = conf < state.threshold && !isChecked;
  rect.className.baseVal = `overlay-rect ${isChecked ? 'checked' : isWarn ? 'warn' : 'normal'}`;
}

async function persistOverlay() {
  if (!state.currentPage) return;
  await fetch(`/api/projects/${encodeURIComponent(state.currentProject)}/page/${encodeURIComponent(state.currentPage)}/overlay`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(state.overlay),
  });
}

async function runOcrAll() {

  });
  const data = await res.json();
  pollProgress(data.job_id, async () => {
    await loadPages(state.currentProject);
    renderPageList();
    toast(t('toastOcrDone'), 'success');
  });
}

function pollProgress(jobId, onDone) {
  const interval = setInterval(async () => {
    const res = await fetch(`/api/ocr_progress/${encodeURIComponent(jobId)}`);
    const data = await res.json();
    if (data.status === 'done') {
      clearInterval(interval);
      onDone();
    } else if (data.status === 'error') {
      clearInterval(interval);
      toast(t('toastOcrError', data.message), 'error');
    } else if (data.status === 'running' && data.message) {
      toast(data.message, '');
    }
  }, 1500);
}

// ── Upload ────────────────────────────────────────────────────────────────────
async function uploadImagesFromInput(e) {
  const files = Array.from(e.target.files);

}

async function doUpload(files) {
  if (!state.currentProject) { toast('プロジェクトを選択してください', 'error'); return; }
  const ALLOWED_EXTS = ['jpg','jpeg','png','tiff','tif','jp2','bmp'];
  const imageFiles = files.filter(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    return ALLOWED_EXTS.includes(ext);
  });
  if (!imageFiles.length) { toast('画像ファイルを選択してください', 'error'); return; }


  // Sort files by name before uploading
  imageFiles.sort((a, b) => a.name.localeCompare(b.name, 'ja'));

  const fd = new FormData();
  for (const f of imageFiles) fd.append('files', f);
  const res = await fetch(`/api/projects/${encodeURIComponent(state.currentProject)}/upload`, {
    method: 'POST', body: fd,
  });
  const data = await res.json();
  toast(t('toastAdded', data.saved.length), 'success');
  await loadPages(state.currentProject);
  await loadProjects();
  renderProjectView();
}

document.addEventListener('dragover', (e) => {

document.addEventListener('drop', async (e) => {
  if (drawState.active) return;
  e.preventDefault();
  if (!state.currentProject) return;
  const files = Array.from(e.dataTransfer.files);
  if (PDF_ENABLED) {
    const images = files.filter(f => f.type.startsWith('image/'));
    const pdfs = files.filter(f => f.name.toLowerCase().endsWith('.pdf'));
    if (images.length) await doUpload(images);
    if (pdfs.length) await doUploadPdfs(pdfs);
  } else {
    await doUpload(files);
  }
});

function toggleSeparatorInput() {
  const on = document.getElementById('exportSeparator').checked;
  document.getElementById('separatorGroup').style.display = on ? '' : 'none';
}

function toggleParaSepInput() {
  const on = document.getElementById('exportParaSeparator').checked;
  document.getElementById('paraSeparatorGroup').style.display = on ? '' : 'none';
}

function getExportPages() {
  const from = parseInt(document.getElementById('exportFrom').value) - 1;
  const to = parseInt(document.getElementById('exportTo').value) - 1;
  const start = Math.max(0, Math.min(from, state.pages.length - 1));
  const end = Math.max(start, Math.min(to, state.pages.length - 1));
  return state.pages.slice(start, end + 1);
}

function buildPageText(blocks, overlay, useParaSep, paraSepStr, useIndent) {
  const lines = [];
  for (const block of blocks) {
    const bid = String(block.id);
    const ov = overlay[bid] || {};
    if (useParaSep && ov.paragraph_break && lines.length > 0) {
      lines.push(paraSepStr !== '' ? paraSepStr : '');
    }
    let text = ov.text !== undefined ? ov.text
               : (block._text !== undefined ? block._text : (block.text || ''));
    // 一字下げ：¶ブロックの先頭に全角スペースを追加（まだない場合のみ）
    if (useIndent && ov.paragraph_break && !text.startsWith('　')) {
      text = '　' + text;
    }
    if (text.trim()) lines.push(text);
  }
  return lines.join('\n');
}

async function updateExportPreview() {
  const fmt = document.getElementById('exportFormat').value;
  const useSep = document.getElementById('exportSeparator').checked;
  const sepTemplate = document.getElementById('separatorText').value;
  const useParaSep = document.getElementById('exportParaSeparator').checked;
  const paraSepStr = document.getElementById('paraSeparatorText').value;
  const useIndent = document.getElementById('exportIndent').checked;
  const pages = getExportPages();

  if (fmt === 'json') {
    document.getElementById('exportPreviewArea').value = lang === 'ja'
      ? '(JSON形式はプレビュー省略)' : '(JSON preview not available)';
    return;
  }

  const parts = [];
  for (let i = 0; i < pages.length; i++) {
    const p = pages[i];
    if (useSep) {
      const pageNum = i + parseInt(document.getElementById('exportFrom').value);
      const sep = sepTemplate.replace(/{n}/g, String(pageNum));
      parts.push(sep);
    }
    try {
      const res = await fetch(`/api/projects/${encodeURIComponent(state.currentProject)}/page/${encodeURIComponent(p.name)}`);
      if (res.ok) {
        const data = await res.json();
        const overlay = data.overlay || {};
        const blocks = data.ocr.contents?.[0] || [];
        parts.push(buildPageText(blocks, overlay, useParaSep, paraSepStr, useIndent));
      }
    } catch(e) {}
  }
  document.getElementById('exportPreviewArea').value = parts.join('\n');
}

async function doExport() {
  const fmt = document.getElementById('exportFormat').value;
  const useSep = document.getElementById('exportSeparator').checked;
  const sepTemplate = document.getElementById('separatorText').value;
  const useParaSep = document.getElementById('exportParaSeparator').checked;
  const paraSepStr = document.getElementById('paraSeparatorText').value;
  const useIndent = document.getElementById('exportIndent').checked;
  const pages = getExportPages();
  closeModal('exportModal');

  const res = await fetch(`/api/projects/${encodeURIComponent(state.currentProject)}/export`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      format: fmt,
      pages: pages.map(p => p.name),
      separator: useSep ? sepTemplate : null,
      para_separator: useParaSep ? paraSepStr : null,
      indent: useIndent,
    }),
  });
  if (res.ok) {
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${state.currentProject}_export.${fmt}`;
    a.click();
    toast(t('toastExportDone'), 'success');
  } else {
    toast(t('toastExportError'), 'error');
  }
}

// ── Text Preview Panel Resize ────────────────────────────────────────────────
function startResizeBottom(e) {
  e.preventDefault();
  const resizer = document.getElementById('resizerBottom');
  const panel = document.getElementById('textPreviewPanel');
  const contentArea = panel.parentElement;
  const startY = e.clientY;
  const startH = panel.offsetHeight;
  const totalH = contentArea.offsetHeight;

  resizer.classList.add('dragging');

  function onMove(e) {
    const delta = startY - e.clientY;  // 上にドラッグ = パネル拡大
    const newH = Math.min(Math.max(80, startH + delta), totalH - 100);
    panel.style.height = newH + 'px';
    panel.style.minHeight = newH + 'px';
    panel.style.transition = 'none';
  }

  function onUp() {
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

  if (!state.pageData) return '';

    const ov = state.overlay[bid] || {};

}

// ── Panel Resize ─────────────────────────────────────────────────────────────
function startResize(e, side) {
  e.preventDefault();
  const startX = e.clientX;
  const resizer = e.currentTarget;
  resizer.classList.add('dragging');

  let startWidth;
  let target;

  if (side === 'left') {
    target = document.getElementById('pagePanel');
    startWidth = target ? target.offsetWidth : 200;
  } else {
    target = document.getElementById('ocrPane');
    startWidth = target ? target.offsetWidth : 380;
  }

  function onMove(e) {
    if (!target) return;
    const dx = e.clientX - startX;
    if (side === 'left') {
      const newW = Math.max(120, Math.min(400, startWidth + dx));
      target.style.width = newW + 'px';
    } else {
      const newW = Math.max(260, Math.min(600, startWidth - dx));
      target.style.width = newW + 'px';
    }
  }

  function onUp() {
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

async function pasteImageFromClipboard() {
  try {
    const items = await navigator.clipboard.read();
    let found = false;
    for (const item of items) {
      const imageType = item.types.find(t => t.startsWith('image/'));
      if (imageType) {
        const blob = await item.getType(imageType);
        const ext = imageType.split('/')[1].replace('jpeg', 'jpg');
        const filename = 'clipboard_' + Date.now() + '.' + ext;
        const file = new File([blob], filename, { type: imageType });
        closeModal('addFileModal');
        await doUpload([file]);
        found = true;
        break;
      }
    }
    if (!found) {
      toast(lang === 'ja' ? 'クリップボードに画像がありません' : 'No image in clipboard', 'error');
    }
  } catch(e) {
    toast(lang === 'ja' ? 'クリップボードへのアクセスが許可されていません' : 'Clipboard access denied', 'error');
  }
}

// ── PDF Upload ────────────────────────────────────────────────────────────────
async function doUploadPdfs(files) {
  if (!state.currentProject) { toast('プロジェクトを選択してください', 'error'); return; }
  const SIZE_LIMIT = 1 * 1024 * 1024 * 1024; // 1GB

  for (const file of files) {
    if (file.size > SIZE_LIMIT) {
      toast(`${file.name}: ファイルサイズが1GBを超えています`, 'error');
      continue;
    }
    toast(`PDF変換中: ${file.name}`, '');
    const fd = new FormData();
    fd.append('file', file);
    fd.append('dpi', 300);

    const res = await fetch(
      `/api/projects/${encodeURIComponent(state.currentProject)}/upload_pdf`,
      { method: 'POST', body: fd }
    );
    const data = await res.json();
    if (data.error) {
      toast(`エラー: ${data.error}`, 'error');
      continue;
    }
    // 進捗ポーリング
    await pollPdfProgress(data.job_id);
    await loadPages(state.currentProject);
    await loadProjects();
    renderPageList();
  }
}

async function pollPdfProgress(jobId) {
  return new Promise(resolve => {
    const interval = setInterval(async () => {
      const res = await fetch(`/api/pdf_progress/${encodeURIComponent(jobId)}`);
      const data = await res.json();
      if (data.status === 'done') {
        clearInterval(interval);
        toast(data.message, 'success');
        resolve();
      } else if (data.status === 'error') {
        clearInterval(interval);
        toast(`PDF変換エラー: ${data.message}`, 'error');
        resolve();
      } else {
        toast('PDF変換中...', '');
      }
    }, 1500);
  });
}
